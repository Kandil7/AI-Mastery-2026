# GitHub Actions Workflow for Releases
# =====================================
# Creates GitHub releases on tag push

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Generate release notes
        id: release_notes
        run: |
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          tail -n 100 CHANGELOG.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          body: |
            ## Release Notes

            ${{ steps.release_notes.outputs.notes }}

            ## Installation

            ```bash
            pip install ai-mastery-2026==${{ github.ref_name }}
            ```

            ## Changes

            See [CHANGELOG.md](https://github.com/Kandil7/AI-Mastery-2026/blob/main/CHANGELOG.md) for detailed changes.

          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

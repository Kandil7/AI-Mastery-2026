# GitHub Stale Bot Configuration
# Automatically close stale issues and PRs
# Documentation: https://github.com/actions/stale

name: 'Close stale issues and PRs'
on:
  schedule:
    - cron: '30 1 * * *'  # Run daily at 1:30 AM UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs. Thank you
            for your contributions.
          close-issue-message: >
            This issue was closed because it has been inactive for 14 days since being
            marked as stale. Please reopen if this is still relevant.
          exempt-issue-labels: 'pinned,security,help wanted,good first issue,bug'
          
          # PRs
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs. Thank you
            for your contributions.
          close-pr-message: >
            This PR was closed because it has been inactive for 7 days since being
            marked as stale. Please reopen if this is still relevant.
          exempt-pr-labels: 'pinned,security,work-in-progress'
          
          # General settings
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          operations-per-run: 100
          remove-stale-when-updated: true
          debug-only: false

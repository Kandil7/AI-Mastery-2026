# RAG System Configuration for Arabic Islamic Literature Corpus
# ============================================================

# Data Configuration
data:
  # Source paths
  datasets_path: "K:/learning/technical/ai-ml/AI-Mastery-2026/datasets"
  extracted_books_path: "K:/learning/technical/ai-ml/AI-Mastery-2026/datasets/extracted_books"
  metadata_path: "K:/learning/technical/ai-ml/AI-Mastery-2026/datasets/metadata"
  
  # Output paths
  output_path: "K:/learning/technical/ai-ml/AI-Mastery-2026/rag_system/data"
  vector_db_path: "K:/learning/technical/ai-ml/AI-Mastery-2026/rag_system/data/vector_db"
  bm25_index_path: "K:/learning/technical/ai-ml/AI-Mastery-2026/rag_system/data/bm25"
  
  # Processing
  batch_size: 100
  num_workers: 4

# Embedding Configuration
embedding:
  # Model selection (Arabic-capable models)
  model_name: "sentence-transformers/paraphrase-multilingual-mpnet-base-v2"
  # Alternative: "sentence-transformers/bert-base-multilingual-cased"
  # Alternative: "aubmindlab/bert-base-arabertv2" (Arabic-specific)
  
  # Embedding settings
  batch_size: 32
  max_length: 512
  normalize_embeddings: true
  
  # Caching
  cache_embeddings: true
  embedding_cache_path: "K:/learning/technical/ai-ml/AI-Mastery-2026/rag_system/data/embedding_cache"

# Vector Database Configuration
vector_db:
  # Database type: qdrant, chroma, weaviate
  type: "qdrant"
  
  # Qdrant settings
  qdrant:
    host: "localhost"
    port: 6333
    collection_name: "arabic_islamic_literature"
    vector_size: 768  # mpnet-base-v2 output dimension
    distance: "Cosine"
    
    # HNSW indexing
    hnsw:
      m: 16
      ef_construct: 200
      full_scan_threshold: 10000
  
  # Chroma settings (alternative)
  chroma:
    collection_name: "arabic_islamic_literature"
    persist_directory: "K:/learning/technical/ai-ml/AI-Mastery-2026/rag_system/data/chroma"

# BM25 Configuration
bm25:
  # Index settings
  k1: 1.5
  b: 0.75
  top_k: 100
  
  # Tokenization
  remove_stopwords: true
  arabic_stopwords_path: "K:/learning/technical/ai-ml/AI-Mastery-2026/rag_system/config/arabic_stopwords.txt"

# Chunking Configuration
chunking:
  # Strategy: fixed, semantic, recursive
  strategy: "semantic"
  
  # Fixed chunking settings
  chunk_size: 512
  chunk_overlap: 50
  
  # Semantic chunking settings
  semantic:
    breakpoint_threshold_type: "percentile"
    breakpoint_threshold_amount: 95
    min_chunk_size: 100
    max_chunk_size: 1000
  
  # Arabic-specific
  preserve_arabic_marks: true
  split_on_sentences: true

# Retrieval Configuration
retrieval:
  # Number of documents to retrieve
  top_k: 5
  top_k_bm25: 20
  top_k_semantic: 20
  
  # Hybrid search weights
  hybrid:
    bm25_weight: 0.3
    semantic_weight: 0.7
  
  # Re-ranking
  enable_reranking: true
  rerank_top_n: 3
  rerank_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

# LLM Configuration
llm:
  # Provider: openai, anthropic, huggingface
  provider: "openai"
  
  # OpenAI settings
  openai:
    model: "gpt-4o"
    temperature: 0.3
    max_tokens: 2000
    # Set API key via OPENAI_API_KEY env var
  
  # Anthropic settings (alternative)
  anthropic:
    model: "claude-3-5-sonnet-20241022"
    temperature: 0.3
    max_tokens: 2000
    # Set API key via ANTHROPIC_API_KEY env var
  
  # HuggingFace settings (alternative - local)
  huggingface:
    model: "meta-llama/Llama-3.1-8B-Instruct"
    device: "cuda"
    max_tokens: 2000

# Generation Configuration
generation:
  # Prompt templates
  system_prompt: |
    You are a knowledgeable assistant specializing in Arabic Islamic literature.
    You have access to a vast collection of Islamic books, hadith commentaries,
    tafsir (Quranic exegesis), and classical Arabic literature.
    
    When answering questions:
    1. Base your answers on the provided context from the source texts
    2. Cite the specific sources (book title, author) when possible
    3. If the context doesn't contain enough information, acknowledge the limitation
    4. Provide answers in Arabic when the question is in Arabic, otherwise in English
    5. Maintain scholarly accuracy and cite references properly
    
  # Context settings
  max_context_chunks: 5
  context_format: "book_title: {book_title}\nAuthor: {author}\nCategory: {category}\nContent: {content}"
  
  # Response settings
  include_sources: true
  source_format: "- {book_title} by {author} ({category})"

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  reload: false
  log_level: "info"
  
  # CORS
  cors_origins: ["*"]
  
  # Rate limiting
  rate_limit: 100  # requests per minute

# Evaluation Configuration
evaluation:
  # Test dataset
  test_questions_path: "K:/learning/technical/ai-ml/AI-Mastery-2026/rag_system/data/test_questions.json"
  
  # Metrics
  metrics:
    - "retrieval_precision"
    - "retrieval_recall"
    - "answer_faithfulness"
    - "answer_relevance"
    - "context_precision"
  
  # Evaluation settings
  sample_size: 100
  random_seed: 42

# Observability
observability:
  # Logging
  log_level: "INFO"
  log_file: "K:/learning/technical/ai-ml/AI-Mastery-2026/rag_system/logs/rag_system.log"
  
  # Tracing
  enable_tracing: true
  tracing_service_name: "arabic-islamic-rag"
  
  # Metrics
  enable_metrics: true
  metrics_port: 9090

# Cost Tracking
cost_tracking:
  enabled: true
  track_embedding_costs: true
  track_llm_costs: true
  budget_alerts:
    daily_limit: 100  # USD
    monthly_limit: 1000  # USD
